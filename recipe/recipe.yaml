context:
  version: "0.14.11"

package:
  name: procs
  version: ${{ version }}

source:
  url: https://github.com/dalance/procs/archive/v${{ version }}.tar.gz
  sha256: 3d6b3561ce05362a092ea8488458f552d6636d3a280290e21f841c432cadf91a

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - procs --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Modern replacement for ps written by Rust
  homepage: https://github.com/dalance/procs
  repository: https://github.com/dalance/procs

extra:
  recipe-maintainers:
    - danielnachun
